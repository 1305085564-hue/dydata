<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYData 登录 — V1.2 法典版</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #F4F4F5; /* L0 zinc-100 */
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 登录卡片 ===== */
  .card {
    width: 100%;
    max-width: 380px;
    background: #FAFAFB; /* L1 zinc-50 */
    border: 1px solid #E4E4E7; /* zinc-200 */
    border-radius: 16px; /* rounded-2xl */
    padding: 40px 32px;
  }

  /* ===== Logo 区域 ===== */
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    width: 48px;
    height: 48px;
    background: #F4F4F5; /* L0 背景 */
    border: 1px solid #E4E4E7;
    border-radius: 12px; /* rounded-xl */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .logo span {
    font-size: 14px;
    font-weight: 600;
    color: #27272A; /* zinc-800 */
    letter-spacing: -0.01em;
  }

  /* Eyebrow 标签 */
  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #A1A1AA; /* zinc-400 */
    margin-bottom: 8px;
  }

  /* Section 标题 */
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #27272A;
    letter-spacing: -0.01em;
    line-height: 1.44;
  }

  .subtitle {
    font-size: 13px;
    color: #71717A; /* zinc-500 */
    line-height: 1.7;
    margin-top: 4px;
    letter-spacing: 0.005em;
  }

  /* ===== 表单 ===== */
  form {
    display: flex;
    flex-direction: column;
    gap: 16px; /* M 档 */
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px; /* S 档 */
  }

  .field-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: #3F3F46; /* zinc-700 */
    line-height: 1.23;
  }

  .forgot-link {
    font-size: 12px;
    color: #A1A1AA;
    text-decoration: none;
    transition: color 150ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .forgot-link:hover {
    color: #27272A;
  }

  /* 输入框 — Soft Fill V1.2 */
  input[type="email"],
  input[type="password"] {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    background: rgba(228, 228, 231, 0.7); /* zinc-100/70 */
    border: 1px solid transparent;
    border-radius: 10px; /* rounded-[10px] */
    font-size: 13px;
    color: #27272A;
    outline: none;
    transition: background-color 150ms cubic-bezier(0.4, 0, 0.2, 1),
                border-color 150ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 150ms cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.005em;
  }

  input::placeholder {
    color: #A1A1AA;
  }

  /* Focus 态 — 白底 + zinc-200 边 + 柔阴影 */
  input:focus {
    background: #FFFFFF;
    border-color: #E4E4E7;
    box-shadow: 0 0 0 4px rgba(39, 39, 42, 0.03);
  }

  /* ===== 记住邮箱 ===== */
  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .remember-row input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #D97757;
    cursor: pointer;
  }

  .remember-row span {
    font-size: 13px;
    color: #71717A;
    cursor: pointer;
    user-select: none;
  }

  /* ===== 主 CTA — 暖橙 V1.2 ===== */
  .btn-primary {
    width: 100%;
    height: 40px;
    background: #D97757;
    border: none;
    border-radius: 10px;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.005em;
    cursor: pointer;
    transition: transform 150ms cubic-bezier(0.4, 0, 0.2, 1),
                background-color 150ms cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 150ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-primary:hover {
    background: #C96442;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(217, 119, 87, 0.03); /* ≤3% 弥散 */
  }

  .btn-primary:active {
    transform: translateY(0);
    background: #C96442;
  }

  /* ===== 分隔线 ===== */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #E4E4E7;
  }

  .divider span {
    font-size: 12px;
    color: #A1A1AA;
  }

  /* ===== 次级按钮 — outline，无阴影 ===== */
  .btn-secondary {
    width: 100%;
    height: 40px;
    background: #FFFFFF;
    border: 1px solid #E4E4E7;
    border-radius: 10px;
    color: #71717A;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.005em;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 150ms cubic-bezier(0.4, 0, 0.2, 1),
                background-color 150ms cubic-bezier(0.4, 0, 0.2, 1),
                color 150ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-secondary:hover {
    background: #FAFAFB;
    transform: translateY(-1px);
    color: #3F3F46;
    /* 次级按钮 × 阴影 */
  }

  .btn-secondary:active {
    transform: translateY(0);
  }

  /* ===== 注册链接 ===== */
  .register-link {
    text-align: center;
    font-size: 13px;
    color: #71717A;
    margin-top: 8px;
  }

  .register-link a {
    color: #27272A;
    text-decoration: underline;
    text-underline-offset: 4px;
    font-weight: 500;
    transition: color 150ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .register-link a:hover {
    color: #D97757;
  }

  /* ===== 左侧装饰（桌面端） ===== */
  .left-panel {
    display: none;
  }

  @media (min-width: 1024px) {
    body {
      gap: 80px;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      max-width: 320px;
    }

    .left-panel .brand-logo {
      width: 56px;
      height: 56px;
      background: #F4F4F5;
      border: 1px solid #E4E4E7;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .left-panel .brand-logo span {
      font-size: 18px;
      font-weight: 600;
      color: #27272A;
    }

    .left-panel h2 {
      font-size: 24px;
      font-weight: 600;
      color: #27272A;
      letter-spacing: -0.01em;
      line-height: 1.33;
      margin-bottom: 12px;
    }

    .left-panel p {
      font-size: 14px;
      color: #71717A;
      line-height: 1.7;
    }

    /* 信息色块 chip — 克制的鲜艳 */
    .chips {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid;
    }

    .chip-orange {
      background: rgba(217, 119, 87, 0.08);
      color: #D97757;
      border-color: rgba(217, 119, 87, 0.15);
    }

    .chip-amber {
      background: rgba(217, 158, 85, 0.08);
      color: #D99E55;
      border-color: rgba(217, 158, 85, 0.15);
    }

    .chip-green {
      background: rgba(111, 170, 125, 0.08);
      color: #6FAA7D;
      border-color: rgba(111, 170, 125, 0.15);
    }
  }
</style>
</head>
<body>

  <!-- 左侧品牌区 -->
  <div class="left-panel">
    <div class="brand-logo"><span>DY</span></div>
    <h2>抖音数据日报平台</h2>
    <p>团队协作 · 数据填报 · 成长分析<br>让每一条视频数据都有迹可循</p>
    <div class="chips">
      <span class="chip chip-orange">实时填报</span>
      <span class="chip chip-amber">AI 洞察</span>
      <span class="chip chip-green">团队协同</span>
    </div>
  </div>

  <!-- 登录卡片 -->
  <div class="card">
    <div class="logo-area">
      <div class="logo"><span>DY</span></div>
      <p class="eyebrow">DYData</p>
      <h1>回到工作台</h1>
      <p class="subtitle">继续处理日报、经营分析和成长复盘</p>
    </div>

    <form onsubmit="return false">
      <div class="field">
        <div class="field-header">
          <label for="email">邮箱</label>
          <a href="#" class="forgot-link">忘记密码</a>
        </div>
        <input id="email" type="email" placeholder="you@dydata.cc" value="1305085564@qq.com" />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" placeholder="请输入密码" value="••••••••••" />
      </div>

      <label class="remember-row">
        <input type="checkbox" checked />
        <span>记住邮箱</span>
      </label>

      <button type="submit" class="btn-primary">登录</button>

      <div class="divider"><span>或者</span></div>

      <a href="#" class="btn-secondary">先看演示站</a>
    </form>

    <p class="register-link">
      还没有账号？
      <a href="#">去注册</a>
    </p>
  </div>

</body>
</html>
