<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYData 登录页改版预览</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', system-ui, sans-serif; }
  .glow { box-shadow: 0 0 60px rgba(59, 130, 246, 0.15); }
  .card-glass { backdrop-filter: blur(20px); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .float-anim { animation: float 3s ease-in-out infinite; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp 0.6s ease-out forwards; }
  .fade-up-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-up-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-up-3 { animation-delay: 0.3s; opacity: 0; }
  .fade-up-4 { animation-delay: 0.4s; opacity: 0; }
  .input-focus:focus { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
  .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.2s; }
  .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
  .btn-primary:active { transform: translateY(0); }
  .mesh-bg {
    background-color: #f8fafc;
    background-image:
      radial-gradient(at 20% 30%, rgba(59,130,246,0.08) 0px, transparent 50%),
      radial-gradient(at 80% 70%, rgba(147,51,234,0.06) 0px, transparent 50%),
      radial-gradient(at 50% 50%, rgba(59,130,246,0.04) 0px, transparent 70%);
  }
</style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center px-6">

  <!-- 左侧装饰 -->
  <div class="hidden lg:flex flex-col justify-center items-end pr-16 max-w-md">
    <div class="float-anim mb-6">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
        <span class="text-white text-2xl font-bold">DY</span>
      </div>
    </div>
    <h2 class="text-3xl font-bold text-zinc-800 mb-3 fade-up fade-up-1">抖音数据日报平台</h2>
    <p class="text-zinc-500 text-base leading-relaxed fade-up fade-up-2">
      团队协作 · 数据填报 · 成长分析<br>
      让每一条视频数据都有迹可循
    </p>
    <div class="flex gap-3 mt-6 fade-up fade-up-3">
      <div class="px-3 py-1.5 rounded-full bg-blue-50 text-blue-600 text-xs font-medium">实时填报</div>
      <div class="px-3 py-1.5 rounded-full bg-purple-50 text-purple-600 text-xs font-medium">AI 洞察</div>
      <div class="px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-600 text-xs font-medium">团队协同</div>
    </div>
  </div>

  <!-- 登录卡片 -->
  <div class="w-full max-w-sm">
    <div class="bg-white/80 card-glass rounded-2xl shadow-xl shadow-zinc-200/50 p-8 border border-white/60 fade-up fade-up-1">
      <!-- 移动端 Logo -->
      <div class="lg:hidden flex justify-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
          <span class="text-white text-xl font-bold">DY</span>
        </div>
      </div>

      <div class="mb-8 space-y-1.5">
        <h1 class="text-xl font-semibold text-zinc-800 tracking-tight">登录 DYData</h1>
        <p class="text-sm text-zinc-400">抖音数据日报平台</p>
      </div>

      <form class="space-y-4" onsubmit="return false">
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-zinc-600" for="email">邮箱</label>
          <input
            id="email"
            type="email"
            placeholder="you@dydata.cc"
            value="1305085564@qq.com"
            class="input-focus w-full px-3.5 py-2.5 rounded-xl border border-zinc-200 bg-white text-sm text-zinc-800 placeholder-zinc-300 outline-none transition-all duration-200 focus:border-blue-400"
          />
        </div>

        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label class="text-sm font-medium text-zinc-600" for="password">密码</label>
            <a href="#" class="text-xs text-zinc-400 hover:text-blue-500 transition-colors">忘记密码</a>
          </div>
          <input
            id="password"
            type="password"
            placeholder="请输入密码"
            value="••••••••••"
            class="input-focus w-full px-3.5 py-2.5 rounded-xl border border-zinc-200 bg-white text-sm text-zinc-800 placeholder-zinc-300 outline-none transition-all duration-200 focus:border-blue-400"
          />
        </div>

        <label class="flex items-center gap-2 text-sm text-zinc-500 cursor-pointer">
          <input type="checkbox" checked class="w-4 h-4 rounded border-zinc-300 text-blue-500 accent-blue-500" />
          记住邮箱
        </label>

        <button type="submit" class="btn-primary w-full py-2.5 rounded-xl text-white text-sm font-medium shadow-sm cursor-pointer">
          登录
        </button>

        <div class="relative my-1">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-zinc-100"></div></div>
          <div class="relative flex justify-center text-xs"><span class="bg-white px-3 text-zinc-300">或者</span></div>
        </div>

        <a href="#" class="flex w-full items-center justify-center rounded-xl border border-zinc-200 bg-white px-4 py-2.5 text-sm font-medium text-zinc-500 transition-all duration-150 hover:-translate-y-0.5 hover:bg-zinc-50 hover:text-zinc-700 hover:shadow-sm active:translate-y-0">
          先看演示站
        </a>
      </form>
    </div>

    <p class="text-center text-sm text-zinc-400 mt-6 fade-up fade-up-4">
      还没有账号？
      <a href="#" class="text-zinc-600 font-medium underline underline-offset-4 hover:text-blue-500 transition-colors">去注册</a>
    </p>
  </div>

</body>
</html>
